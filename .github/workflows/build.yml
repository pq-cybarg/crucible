name: build

# Multiplatform autobuild. Every build step here was verified locally before commit
# (PWA build, PyInstaller CLI binary, multi-arch Docker image, container run).
#
# Coverage:
#   - Windows 10+        → native CLI .exe (+ Docker Desktop for the backend)
#   - macOS (Intel+ARM)  → native CLI binary
#   - Linux x86_64+ARM64 → CLI binary, AppImage, .deb, multi-arch Docker
#                          (AppImage/.deb/Docker run on EVERY distro: Kali, Whonix,
#                           Tails, Debian/Arch forks, any new fork — by format, not allowlist)
#   - Raspberry Pi       → linux/arm64 Docker + arm64 CLI binary + arm64 AppImage
#   - Android            → Capacitor APK (thin client)
#   - iOS                → Capacitor archive (thin client)
#   - Any browser/OS     → installable PWA (thin client)

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -e ".[dev]"
      - run: pytest -q
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - run: cd frontend && npm ci && npm run build

  pwa:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - run: cd frontend && npm ci && npm run build
      - uses: actions/upload-artifact@v4
        with: { name: crucible-pwa, path: frontend/dist }

  cli-binaries:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,    name: linux-x86_64 }
          - { os: ubuntu-24.04-arm, name: linux-arm64 }   # Raspberry Pi class
          - { os: windows-latest,   name: windows-x86_64 }
          - { os: macos-13,         name: macos-x86_64 }
          - { os: macos-14,         name: macos-arm64 }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -e . pyinstaller
      - name: Build CLI binary
        run: >
          pyinstaller --onefile --name crucible --paths backend
          --collect-submodules crucible
          --exclude-module torch --exclude-module transformers
          --exclude-module lm_eval --exclude-module datasets
          packaging/cli_main.py --distpath dist-bin
      - uses: actions/upload-artifact@v4
        with: { name: crucible-cli-${{ matrix.name }}, path: dist-bin/* }

  docker:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64   # arm64 = Raspberry Pi & ARM servers
          push: ${{ github.event_name != 'pull_request' }}
          tags: ghcr.io/${{ github.repository }}:latest

  linux-packages:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - run: pip install -e . pyinstaller
      - run: cd frontend && npm ci && npm run build
      - name: AppImage (portable — runs on Kali/Whonix/Tails/any distro)
        run: bash packaging/build_appimage.sh
      - name: Debian package
        run: bash packaging/build_deb.sh
      - uses: actions/upload-artifact@v4
        with: { name: crucible-linux-packages, path: "dist-pkg/*" }

  android:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "21" }
      - name: Build APK (Capacitor thin client)
        run: bash packaging/build_mobile.sh android
      - uses: actions/upload-artifact@v4
        with: { name: crucible-android-apk, path: "frontend/android/app/build/outputs/**/*.apk" }

  ios:
    needs: test
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - name: Build iOS archive (Capacitor thin client, unsigned)
        run: bash packaging/build_mobile.sh ios
      - uses: actions/upload-artifact@v4
        with: { name: crucible-ios-archive, path: "frontend/ios/**/*.xcarchive" }

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [cli-binaries, pwa, linux-packages, android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with: { path: artifacts }
      - run: cd artifacts && for d in */; do (cd "$d" && zip -r "../${d%/}.zip" .); done
      - uses: softprops/action-gh-release@v2
        with: { files: "artifacts/*.zip" }
